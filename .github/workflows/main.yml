name: Keep Render App Awake

on:
  schedule:
    # Runs every 14 minutes to prevent Render's free tier from sleeping (which happens after 15 mins)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render URL
        run: |
          # Replace this URL with your actual Render web service URL
          curl -I -s https://project1-pvbj.onrender.com > /dev/null
          echo "Pinged Render app successfully"
